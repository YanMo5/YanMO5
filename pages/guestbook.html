    <script src="/js/local-api.js"></script>

    <main>
        <section class="guestbook-page">
            <h1>留言板 | GUESTBOOK</h1>
            <p class="guestbook-description">欢迎留下你的想法和建议</p>
            
            <div class="guestbook-actions">
                <a href="message-apply.html" class="btn">写留言</a>
            </div>

            <div class="guestbook-messages">
                <h2>留言列表</h2>
                <div class="message-list" id="message-list">
                    <!-- 留言数据将通过JavaScript动态加载 -->
                    <div class="message-item">
                        <div class="message-content" style="text-align: center; padding: 2rem;">
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            <script>
                // 加载留言数据
                async function loadMessages() {
                    try {
                        const response = await fetch('/api/messages');
                        if (response.ok) {
                            const messages = await response.json();
                            const messageList = document.getElementById('message-list');
                            messageList.innerHTML = '';
                            
                            if (messages.length === 0) {
                                messageList.innerHTML = `
                                    <div class="message-item">
                                        <div class="message-content" style="text-align: center; padding: 2rem;">
                                            <p>暂无留言</p>
                                        </div>
                                    </div>
                                `;
                                return;
                            }
                            
                            messages.forEach(message => {
                                const messageItem = document.createElement('div');
                                messageItem.className = 'message-item';
                                messageItem.innerHTML = `
                                    <div class="message-header">
                                        <span class="message-author">${message.name}</span>
                                        <span class="message-date">${message.created_at}</span>
                                    </div>
                                    <div class="message-content">
                                        <p>${message.message}</p>
                                    </div>
                                `;
                                messageList.appendChild(messageItem);
                            });
                        }
                    } catch (error) {
                        console.error('加载留言失败:', error);
                        const messageList = document.getElementById('message-list');
                        messageList.innerHTML = `
                            <div class="message-item">
                                <div class="message-content" style="text-align: center; padding: 2rem;">
                                    <p>加载失败</p>
                                </div>
                            </div>
                        `;
                    }
                }
                
                // 初始加载留言
                loadMessages();
                
                // 每30秒刷新一次
                setInterval(loadMessages, 30000);
            </script>
        </section>
    </main>

    <script>
        // 主题切换功能
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.querySelector('.theme-toggle');
            const body = document.body;
            
            // 检查本地存储中的主题偏好
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                themeToggle.textContent = '切换到赛博模式';
            }
            
            // 主题切换点击事件
            themeToggle.addEventListener('click', function() {
                body.classList.toggle('light-mode');
                
                if (body.classList.contains('light-mode')) {
                    themeToggle.textContent = '切换到赛博模式';
                    localStorage.setItem('theme', 'light');
                } else {
                    themeToggle.textContent = '切换到白昼模式';
                    localStorage.setItem('theme', 'dark');
                }
            });
        });
    </script>
</body>
