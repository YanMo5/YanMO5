    </header>

    <script src="/js/local-api.js"></script>

    <main>
        <section class="links-page">
            <h1>友链 | LINKS</h1>
            <p class="links-description">友情链接，共同成长</p>
            
            <div class="links-actions">
                <a href="link-apply.html" class="btn">申请友链</a>
            </div>

            <div class="links-list">
                <h2>友情链接</h2>
                <div class="links-grid" id="links-grid">
                    <!-- 友链数据将通过JavaScript动态加载 -->
                    <div class="link-item">
                        <div class="link-card" style="text-align: center; padding: 2rem;">
                            <div class="link-name">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
            <script>
                // 加载已通过的友链
                async function loadApprovedLinks() {
                    try {
                        const response = await fetch('/api/links');
                        if (response.ok) {
                            const links = await response.json();
                            const linksGrid = document.getElementById('links-grid');
                            linksGrid.innerHTML = '';
                            
                            // 过滤出已通过的友链
                            const approvedLinks = links.filter(link => link.status === 'approved');
                            
                            if (approvedLinks.length === 0) {
                                linksGrid.innerHTML = `
                                    <div class="link-item">
                                        <div class="link-card" style="text-align: center; padding: 2rem;">
                                            <div class="link-name">暂无友情链接</div>
                                        </div>
                                    </div>
                                `;
                                return;
                            }
                            
                            approvedLinks.forEach(link => {
                                const linkItem = document.createElement('div');
                                linkItem.className = 'link-item';
                                linkItem.innerHTML = `
                                    <a href="${link.site_url}" target="_blank" class="link-card">
                                        <div class="link-name">${link.site_name}</div>
                                        <div class="link-description">${link.site_description}</div>
                                    </a>
                                `;
                                linksGrid.appendChild(linkItem);
                            });
                        }
                    } catch (error) {
                        console.error('加载友链失败:', error);
                        const linksGrid = document.getElementById('links-grid');
                        linksGrid.innerHTML = `
                            <div class="link-item">
                                <div class="link-card" style="text-align: center; padding: 2rem;">
                                    <div class="link-name">加载失败</div>
                                </div>
                            </div>
                        `;
                    }
                }
                
                // 初始加载友链
                loadApprovedLinks();
                
                // 每30秒刷新一次
                setInterval(loadApprovedLinks, 30000);
            </script>
        </section>
    </main>

    <script>
        // 主题切换功能
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.querySelector('.theme-toggle');
            const body = document.body;
            
            // 检查本地存储中的主题偏好
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                themeToggle.textContent = '切换到赛博模式';
            }
            
            // 主题切换点击事件
            themeToggle.addEventListener('click', function() {
                body.classList.toggle('light-mode');
                
                if (body.classList.contains('light-mode')) {
                    themeToggle.textContent = '切换到赛博模式';
                    localStorage.setItem('theme', 'light');
                } else {
                    themeToggle.textContent = '切换到白昼模式';
                    localStorage.setItem('theme', 'dark');
                }
            });
        });
    </script>
</body>
