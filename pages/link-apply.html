    <main>
        <section class="links-page">
            <h1>友链申请 | LINK APPLY</h1>
            <p class="links-description">申请成为友情链接，共同成长</p>
            
            <div class="links-form">
                <h2>申请友链</h2>
                <form id="link-form">
                    <div class="form-group">
                        <label for="site-name">网站名称</label>
                        <input type="text" id="site-name" name="site-name" required>
                    </div>
                    <div class="form-group">
                        <label for="site-url">网站链接</label>
                        <input type="url" id="site-url" name="site-url" required>
                    </div>
                    <div class="form-group">
                        <label for="site-description">网站描述</label>
                        <textarea id="site-description" name="site-description" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn">提交申请</button>
                    <div id="form-message" class="form-message"></div>
                </form>
                <script>
                    document.getElementById('link-form').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        
                        const siteName = document.getElementById('site-name').value;
                        const siteUrl = document.getElementById('site-url').value;
                        const siteDescription = document.getElementById('site-description').value;
                        const formMessage = document.getElementById('form-message');
                        
                        formMessage.textContent = '提交中...';
                        formMessage.style.color = '#0ff';
                        
                        try {
                            const response = await fetch('/api/links', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ 
                                    'site-name': siteName, 
                                    'site-url': siteUrl, 
                                    'site-description': siteDescription 
                                })
                            });
                            
                            if (response.ok) {
                                formMessage.textContent = '友链申请提交成功！请等待审核';
                                formMessage.style.color = '#00ff80';
                                document.getElementById('link-form').reset();
                            } else {
                                const error = await response.json();
                                formMessage.textContent = '提交失败: ' + error.error;
                                formMessage.style.color = '#ff6b6b';
                            }
                        } catch (error) {
                            formMessage.textContent = '网络错误，请稍后再试';
                            formMessage.style.color = '#ff6b6b';
                        }
                    });
                </script>
            </div>
        </section>
    </main>

    <script>
        // 主题切换功能
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.querySelector('.theme-toggle');
            const body = document.body;
            
            // 检查本地存储中的主题偏好
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                themeToggle.textContent = '切换到赛博模式';
            }
            
            // 主题切换点击事件
            themeToggle.addEventListener('click', function() {
                body.classList.toggle('light-mode');
                
                if (body.classList.contains('light-mode')) {
                    themeToggle.textContent = '切换到赛博模式';
                    localStorage.setItem('theme', 'light');
                } else {
                    themeToggle.textContent = '切换到白昼模式';
                    localStorage.setItem('theme', 'dark');
                }
            });
        });
    </script>
